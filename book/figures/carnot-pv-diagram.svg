<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 580" width="750" height="580">
  <defs>
    <!-- Arcering patroon voor netto arbeid -->
    <pattern id="stripe" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#e8f8f0"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#a3d9ba" stroke-width="3"/>
    </pattern>
  </defs>

  <rect width="750" height="580" fill="#ffffff" rx="8"/>

  <!-- ====== ASSEN ====== -->
  <!-- P-as -->
  <line x1="80" y1="480" x2="80" y2="40" stroke="#2c3e50" stroke-width="1.8"/>
  <polygon points="80,34 74,47 86,47" fill="#2c3e50"/>

  <!-- V-as -->
  <line x1="80" y1="480" x2="690" y2="480" stroke="#2c3e50" stroke-width="1.8"/>
  <polygon points="695,480 682,474 682,486" fill="#2c3e50"/>

  <text x="30" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50" transform="rotate(-90,30,260)">DRUK  P</text>
  <text x="385" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">VOLUME  V</text>

  <!-- ====== GESTIPELDE ISOTHERMEN (voor context) ====== -->
  <!-- Bovenste isotherm (Th): buigt van linksboven naar midden-rechts -->
  <path d="M 125 130 Q 180 120 260 135 T 420 175 T 570 245"
        stroke="#e74c3c" stroke-width="2" stroke-dasharray="7,5" fill="none" opacity="0.45"/>

  <!-- Onderste isotherm (Tc): onder parallel met bovenste -->
  <path d="M 135 390 Q 200 370 280 365 T 420 390 T 590 440"
        stroke="#3498db" stroke-width="2" stroke-dasharray="7,5" fill="none" opacity="0.45"/>

  <!-- ====== CARNOT-CYCLUS ====== -->
  <!-- Hoekpunten:
       A: (165, 140) — boven-linksboven: hoogste druk, kleinste volume — op Th-isotherm
       B: (480, 220) — rechtsmidden: volumevergroting, P-verlies — op Th-isotherm  
       C: (560, 430) — rechts-linksonder: groot volume, lage druk op Tc-isotherm na afkoeling
       D: (195, 350) — linksmidden: volume-krimp, op Tc-isotherm
  -->

  <!-- Gearceerd vlak (W_netto) -->
  <path d="M 165 140
           C 240 130 360 150 480 220
           C 500 280 525 355 560 430
           C 460 400 330 375 195 350
           C 175 280 168 210 165 140 Z"
        fill="url(#stripe)" stroke="none"/>

  <!-- Stap A→B: Isotherme expansie (bovenste curve, op Th) — lang, horizontale lijn rechts -->
  <path d="M 165 140 C 240 130 360 150 480 220" stroke="#e74c3c" stroke-width="3.5" fill="none"/>

  <!-- Stap B→C: Adiabatische expansie — korte steile val rechts -->
  <path d="M 480 220 C 500 280 525 355 560 430" stroke="#e67e22" stroke-width="3.5" fill="none"/>

  <!-- Stap C→D: Isotherme compressie (onderste curve, op Tc) — lang, horizontale lijn links -->
  <path d="M 560 430 C 460 400 330 375 195 350" stroke="#3498db" stroke-width="3.5" fill="none"/>

  <!-- Stap D→A: Adiabatische compressie (linkersteile, T stijgt van Tc naar Th) -->
  <path d="M 195 350 C 175 280 168 210 165 140" stroke="#8e44ad" stroke-width="3.5" fill="none"/>

  <!-- ====== PUNTEN A, B, C, D ====== -->
  <circle cx="165" cy="140" r="7" fill="#e74c3c" stroke="#2c3e50" stroke-width="2"/>
  <text x="135" y="135" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c0392b">A</text>

  <circle cx="480" cy="220" r="7" fill="#e74c3c" stroke="#2c3e50" stroke-width="2"/>
  <text x="491" y="215" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c0392b">B</text>

  <circle cx="560" cy="430" r="7" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  <text x="572" y="440" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2471a3">C</text>

  <circle cx="195" cy="350" r="7" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  <text x="165" y="358" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2471a3">D</text>

  <!-- ====== LABELS BIJ DE STAPPEN ====== -->
  <!-- Bovenste curve: isotherme expansie -->
  <text x="305" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c0392b">① Isotherme expansie (A→B)</text>
  <text x="290" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#c0392b">Q<tspan baseline-shift="sub" font-size="9">h</tspan> opgenomen, T=T<tspan baseline-shift="sub" font-size="9">h</tspan></text>

  <!-- Rechter verticale steilwand: adiabatische expansie -->
  <text x="585" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e67e22">② Adiab.</text>
  <text x="585" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">Q=0</text>
  <text x="585" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#e67e22">T↓ van T<tspan baseline-shift="sub" font-size="9">h</tspan> naar T<tspan baseline-shift="sub" font-size="9">c</tspan></text>

  <!-- Onderste curve: isotherme compressie -->
  <text x="355" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2471a3">③ Isotherme compressie (C→D)</text>
  <text x="340" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#2471a3">Q<tspan baseline-shift="sub" font-size="9">c</tspan> afgevoerd, T=T<tspan baseline-shift="sub" font-size="9">c</tspan></text>

  <!-- Linker verticale steilwand: adiabatische compressie -->
  <text x="105" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#8e44ad">④ Adiab. comp.</text>
  <text x="110" y="270" font-family="Arial, sans-serif" font-size="12" fill="#8e44ad">Q=0</text>
  <text x="110" y="288" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#8e44ad">T↑ van T<tspan baseline-shift="sub" font-size="9">c</tspan> naar T<tspan baseline-shift="sub" font-size="9">h</tspan></text>

  <!-- ====== NETTO ARBEID IN HET MIDDENVLAK ====== -->
  <text x="370" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">W<tspan baseline-shift="sub" font-size="12">netto</tspan> = Q<tspan baseline-shift="sub" font-size="12">h</tspan> − Q<tspan baseline-shift="sub" font-size="12">c</tspan></text>
  <text x="370" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">Oppervlak van het gearceerde vlak</text>

  <!-- ====== TEMPERATUUR ====== -->
  <text x="620" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">T=T<tspan baseline-shift="sub" font-size="10">h</tspan></text>
  <text x="620" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">T=T<tspan baseline-shift="sub" font-size="10">c</tspan></text>

  <!-- ====== LEGENDA ====== -->
  <rect x="430" y="500" width="16" height="16" rx="3" fill="#e74c3c"/>
  <text x="452" y="513" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Isotherm (constante T)</text>

  <rect x="430" y="518" width="16" height="16" rx="3" fill="#e67e22"/>
  <text x="452" y="531" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Adiabatisch (Q=0, geen warmte)</text>

  <rect x="430" y="536" width="16" height="16" fill="url(#stripe)" stroke="#888" stroke-width="1"/>
  <text x="452" y="549" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Nuttige arbeid W<tspan baseline-shift="sub" font-size="9">netto</tspan></text>

  <!-- ====== ONDERSCHRIFT ====== -->
  <text x="375" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Figuur: De Carnot-cyclus in een pV-diagram — de 4 stappen en de netto geleverde arbeid</text>
</svg>