<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <rect width="400" height="180" fill="#ffffff" rx="6"/>
  
  <!-- Bell jar -->
  <path d="M 80 30 L 80 100 Q 100 150 200 150 Q 300 150 320 100 L 320 30 Z" fill="#f0f4f8" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Korte kaars (links) -->
  <rect x="140" y="100" width="12" height="40" rx="2" fill="#f5e6d3" stroke="#2c3e50" stroke-width="1"/>
  <line x1="146" y1="100" x2="146" y2="96" stroke="#555" stroke-width="1.5"/>
  <path d="M 146 96 Q 153 78 146 70 Q 139 78 146 96 Z" fill="#f39c12" opacity="0.85"/>
  <text x="146" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">kort</text>

  <!-- Lange kaars (rechts) -->
  <rect x="240" y="70" width="12" height="70" rx="2" fill="#f5e6d3" stroke="#2c3e50" stroke-width="1"/>
  <line x1="246" y1="70" x2="246" y2="66" stroke="#555" stroke-width="1.5"/>
  <path d="M 246 66 Q 253 48 246 40 Q 239 48 246 66 Z" fill="#f39c12" opacity="0.85"/>
  <text x="246" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">lang</text>

  <!-- CO2 laag (bovenste gestippeld vlak) -->
  <path d="M 80 30 L 80 75 Q 130 68 200 72 Q 270 68 320 75 L 320 30 Z" fill="#e8f0fe" opacity="0.6"/>
  <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2471a3" font-weight="bold">CO₂ laag</text>
  
  <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Welke kaars dooft het eerst? Waarom?</text>
</svg>