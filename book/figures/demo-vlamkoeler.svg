<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280">
  <rect width="500" height="280" fill="#ffffff" rx="6"/>

  <!-- Kaars (rechter, groter) -->
  <rect x="110" y="130" width="30" height="110" rx="3" fill="#f5ebdc" stroke="#2c3e50" stroke-width="1.8"/>
  
  <!-- Lont -->
  <rect x="122" y="122" width="6" height="10" rx="1" fill="#444" stroke="#2c3e50" stroke-width="0.3"/>
  
  <!-- Vlam onder de spiraal (geel/oranje) -->
  <path d="M 125 122 Q 140 95 125 70 Q 110 95 125 122 Z" fill="#f39c12" opacity="0.9"/>
  <path d="M 125 122 Q 133 100 125 82 Q 117 100 125 122 Z" fill="#e74c3c" opacity="0.75"/>

  <!-- Koperen spiraal (gewikkeld rond de vlamzone) -->
  <!-- 5 windingen als losse ovalen -->
  <ellipse cx="125" cy="95" rx="22" ry="8" fill="none" stroke="#e67e22" stroke-width="3"/>
  <ellipse cx="125" cy="86" rx="24" ry="8" fill="none" stroke="#e67e22" stroke-width="3"/>
  <ellipse cx="125" cy="77" rx="26" ry="8" fill="none" stroke="#e67e22" stroke-width="3"/>
  <ellipse cx="125" cy="68" rx="28" ry="8" fill="none" stroke="#e67e22" stroke-width="3"/>

  <!-- Kleine vlam boven de spiraal (wordt weer aangestoken) -->
  <path d="M 125 52 Q 132 42 125 35 Q 118 42 125 52 Z" fill="#f39c12" opacity="0.7"/>
  <path d="M 125 52 Q 129 46 125 40 Q 121 46 125 52 Z" fill="#e74c3c" opacity="0.6"/>

  <!-- Labels -->
  <!-- Onder: brandende vlam -->
  <text x="40" y="100" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#e67e22">vlam</text>
  <text x="40" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#e67e22">onder spiraal</text>
  
  <!-- Midden: spiraal label -->
  <text x="175" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d35400">koperen</text>
  <text x="175" y="94" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d35400">spiraal</text>
  <text x="175" y="110" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">warmte</text>
  <text x="175" y="124" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">geleider</text>

  <!-- Boven: relight vlam label -->
  <text x="40" y="50" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#e67e22">opnieuw</text>
  <text x="40" y="65" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#e67e22">aangestoken</text>

  <!-- Warmte-afvoer pijlen (rechts van spiraal) -->
  <line x1="160" y1="72" x2="215" y2="60" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrHeat)"/>
  <line x1="160" y1="78" x2="215" y2="68" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrHeat)"/>
  <line x1="160" y1="84" x2="215" y2="76" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrHeat)"/>

  <!-- Tekst rechts -->
  <text x="260" y="56" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">warmte</text>
  <text x="260" y="72" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e74c3c">afgevoerd</text>

  <!-- Verklaring onder -->
  <text x="250" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Zonder spiraal brandt de kaars normaal. De koperen spiraal</text>
  <text x="250" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">voert warmte zó snel af dat de temperatuur onder de</text>
  <text x="250" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">ontbrandingstemperatuur zakt. De damp is er nog wél —</text>
  <text x="250" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">boven de spiraal kun je de vlam opnieuw aansteken.</text>

  <text x="250" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" font-style="italic">Koper is een uitstekende warmtegeleider — het "steelt" de activeringsenergie van de vlam.</text>

  <defs>
    <marker id="arrHeat" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>