<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <rect width="400" height="180" fill="#ffffff" rx="6"/>
  
  <!-- Petrischaal met water -->
  <ellipse cx="200" cy="120" rx="90" ry="18" fill="#d6eaf8" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="200" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2471a3">water (verdamping)</text>

  <!-- Papier vel boven schaal -->
  <rect x="115" y="65" width="170" height="50" rx="2" fill="#fafafa" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">PAPIER</text>
  
  <!-- IR camera boven -->
  <rect x="175" y="15" width="50" height="30" rx="6" fill="#2c3e50" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">📷 IR</text>
  
  <!-- IR golven naar beneden -->
  <line x1="190" y1="45" x2="185" y2="65" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="45" x2="200" y2="65" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="210" y1="45" x2="215" y2="65" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Verdamping pijltjes omhoog -->
  <line x1="200" y1="118" x2="200" y2="105" stroke="#3498db" stroke-width="1.5"/>
  <polygon points="196,108 200,102 204,108" fill="#3498db"/>
  
  <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Condensatiewarmte zichtbaar in infrarood — ΔT ≈ 1°C</text>
</svg>