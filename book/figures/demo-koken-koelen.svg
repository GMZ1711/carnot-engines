<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <rect width="400" height="180" fill="#ffffff" rx="6"/>
  
  <!-- Erlenmeyer met water en thermometer -->
  <path d="M 60 35 L 60 110 Q 60 130 110 125 L 160 125 Q 210 130 210 110 L 210 35 Z" fill="#f0f4f8" stroke="#2c3e50" stroke-width="2"/>
  <rect x="210" y="30" width="75" height="5" rx="2" fill="#bdc3c7"/>
  
  <!-- Water in de erlenmeyer -->
  <path d="M 62 80 L 62 110 Q 65 122 110 120 L 175 120 Q 205 122 208 110 L 208 80 Z" fill="#d6eaf8" opacity="0.7"/>

  <!-- Thermometer -->
  <line x1="135" y1="55" x2="135" y2="95" stroke="#e74c3c" stroke-width="3"/>
  <circle cx="135" cy="98" r="5" fill="#e74c3c"/>
  
  <!-- Thermometer label -->
  <text x="100" y="55" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">~ 100°C</text>
  
  <!-- Stop (kurk) -->
  <rect x="60" y="30" width="20" height="10" rx="3" fill="#d4a574"/>

  <!-- Fase 2: Gekantelde erlenmeyer na koud water -->
  <path d="M 310 35 L 310 90 Q 312 120 340 110 L 370 110 Q 390 120 392 90 L 392 35 Z" fill="#f0f4f8" stroke="#2c3e50" stroke-width="2"/>
  <rect x="292" y="30" width="20" height="10" rx="3" fill="#d4a574"/>
  
  <path d="M 312 65 L 312 90 Q 315 108 340 105 L 365 105 Q 388 108 390 90 L 390 65 Z" fill="#d6eaf8" opacity="0.7"/>
  
  <!-- Koud water stroom van rechtsonder naar erlenmeyer -->
  <line x1="420" y1="55" x2="395" y2="60" stroke="#3498db" stroke-width="2.5"/>
  <line x1="420" y1="65" x2="393" y2="68" stroke="#3498db" stroke-width="2.5"/>
  <text x="430" y="64" font-family="Arial, sans-serif" font-size="10" fill="#3498db" font-weight="bold">koud</text>
  <text x="430" y="76" font-family="Arial, sans-serif" font-size="10" fill="#3498db" font-weight="bold">water</text>
  
  <!-- Bubbels in gekantelde fles -->
  <circle cx="340" cy="85" r="4" fill="none" stroke="#3498db" stroke-width="1.5"/>
  <circle cx="360" cy="80" r="3" fill="none" stroke="#3498db" stroke-width="1.2"/>
  <circle cx="350" cy="92" r="3.5" fill="none" stroke="#3498db" stroke-width="1.3"/>
  <circle cx="370" cy="88" r="3" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Thermometer -->
  <line x1="345" y1="47" x2="345" y2="75" stroke="#e74c3c" stroke-width="3"/>
  <circle cx="345" cy="78" r="5" fill="#e74c3c"/>
  <text x="320" y="47" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="bold">~ 80°C</text>
  
  <!-- Pijlen van fase 1 naar fase 2 -->
  <text x="260" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" font-weight="bold">→</text>
  
  <text x="240" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Stap 1: koken op 100°C → omkeren → afkoelen → koken op 80°C</text>
</svg>