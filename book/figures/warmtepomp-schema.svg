<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" width="700" height="620">
  <defs>
    <marker id="arrQhBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrQcBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <rect width="700" height="620" fill="#ffffff" rx="8"/>

  <!-- Warmtepomp apparaat -->
  <rect x="215" y="85" width="270" height="350" rx="15" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2"/>
  <rect x="230" y="105" width="240" height="30" fill="#3498db2080" rx="8"/>
  <text x="350" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">WARMTEPOMP</text>

  <!-- Warm reservoir (binnenhuis, warm) -->
  <rect x="190" y="190" width="320" height="80" rx="10" fill="#fde8e8" stroke="#e74c3c" stroke-width="2"/>
  <text x="350" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">WARME ZIJDE — T<tspan baseline-shift="sub" font-size="10">h</tspan></text>
  <text x="350" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">bijv. woonkamer 20°C</text>

  <!-- Q_h warmte afvoer (uit pomp naar binnen) -->
  <line x1="350" y1="270" x2="350" y2="195" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrQhBlue)"/>
  <text x="365" y="238" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">Q<tspan baseline-shift="sub" font-size="10">h</tspan> — warmte afgegeven</text>

  <!-- Compressor (arbeid input) -->
  <line x1="370" y1="310" x2="530" y2="310" stroke="#2c3e50" stroke-width="3" marker-end="url(#arrW)"/>
  <text x="540" y="314" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">W — stroom in</text>

  <!-- Koud reservoir (buiten) -->
  <rect x="190" y="350" width="320" height="85" rx="10" fill="#e8f0fe" stroke="#3498db" stroke-width="2"/>
  <text x="350" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2471a3">KOUDE ZIJDE — T<tspan baseline-shift="sub" font-size="10">c</tspan></text>
  <text x="350" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">bijv. buitenlucht 2°C</text>

  <!-- Q_c warmte opname (van buiten naar pomp) -->
  <line x1="350" y1="350" x2="350" y2="380" stroke="#3498db" stroke-width="4"/>
  <text x="430" y="372" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">Q<tspan baseline-shift="sub" font-size="10">c</tspan> — warmte uit omgeving</text>

  <!-- Uitlegend tekst links -->
  <text x="350" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Energiebalans warmtepomp: Q<tspan baseline-shift="sub" font-size="10">h</tspan> = Q<tspan baseline-shift="sub" font-size="10">c</tspan> + W</text>
  <text x="350" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d">Eén kWh stroom (W) + warmte uit de omgeving geeft je méér kWh aan warmte</text>

  <!-- Renderendement formule -->
  <text x="350" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">COP<tspan baseline-shift="sub" font-size="12">warmtepomp</tspan> = Q<tspan baseline-shift="sub" font-size="12">h</tspan> / W > 1</text>
  <text x="350" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#95a5a6">De COP kan ver boven 1 liggen: een warmtepomp levert méér warmte dan de elektriciteit die je erin stopt.</text>

  <!-- Flow pijlen rond de pomp -->
  <!-- Qh naar boven -->
  <!-- Qc naar onder -->
  <line x1="350" y1="435" x2="350" y2="400" stroke="#3498db" stroke-width="4" marker-end="url(#arrQcBlue)"/>

  <text x="350" y="610" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0" font-style="italic">De pomp verplaatst warmte van koud naar warm — dit gaat nooit vanzelf (tweede hoofdwet)</text>
</svg>