<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" width="720" height="520">
  <defs>
    <marker id="aQh" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="aQc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="aW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <rect width="720" height="520" fill="#ffffff" rx="8"/>

  <!-- ====== WARM RESERVOIR (boven) ====== -->
  <text x="360" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">WARME ZIJDE — T<tspan baseline-shift="sub" font-size="10">h</tspan></text>
  <rect x="180" y="40" width="360" height="60" rx="12" fill="#fde8e8" stroke="#e74c3c" stroke-width="2"/>
  <text x="360" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c0392b">Binnenruimte (woonkamer)</text>
  <text x="360" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">~ 20 °C</text>

  <!-- ====== WARMTEPOMP (midden) ====== -->
  <text x="360" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">WARMTEPOMP</text>
  <rect x="210" y="135" width="300" height="90" rx="12" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2"/>
  <text x="360" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Compressor + warmtewisselaars</text>
  <text x="360" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">omgekeerde Carnot-cyclus</text>
  <text x="360" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">COP ≈ 4,5</text>

  <!-- ====== KOUD RESERVOIR (onder) ====== -->
  <text x="360" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2471a3">KOUDE ZIJDE — T<tspan baseline-shift="sub" font-size="10">c</tspan></text>
  <rect x="180" y="255" width="360" height="60" rx="12" fill="#e8f0fe" stroke="#3498db" stroke-width="2"/>
  <text x="360" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2471a3">Buitenlucht of bodem</text>
  <text x="360" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">~ 2 °C</text>

  <!-- ====== PIJLEN (links: Qh omhoog, Qc omhoog) ====== -->

  <!-- Qc: van koude reservoir naar warmtepomp (binnen de pomp) -->
  <line x1="360" y1="255" x2="360" y2="228" stroke="#3498db" stroke-width="3.5" marker-end="url(#aQc)"/>

  <!-- Qh: van warmtepomp naar warm reservoir -->
  <line x1="360" y1="135" x2="360" y2="105" stroke="#e74c3c" stroke-width="3.5" marker-end="url(#aQh)"/>

  <!-- ====== LABELS PER PIJL (voldoende afstand) ====== -->

  <!-- Qh label -->
  <text x="440" y="118" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">Q<tspan baseline-shift="sub" font-size="10">h</tspan></text>
  <text x="500" y="118" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">warmte afgegeven</text>

  <!-- Qc label -->
  <text x="440" y="248" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3498db">Q<tspan baseline-shift="sub" font-size="10">c</tspan></text>
  <text x="500" y="248" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">warmte uit omgeving</text>

  <!-- W: elektriciteitspijl (rechts, van compressor weg) -->
  <line x1="515" y1="180" x2="620" y2="180" stroke="#2c3e50" stroke-width="3" marker-end="url(#aW)"/>
  <text x="530" y="168" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">W</text>
  <text x="560" y="168" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">elektriciteit in</text>

  <!-- ====== FORMULES (onder, apart blok) ====== -->
  <rect x="100" y="350" width="520" height="155" rx="12" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1"/>

  <text x="360" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">Energiebalans</text>
  <text x="360" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Q<tspan baseline-shift="sub" font-size="13">h</tspan> = Q<tspan baseline-shift="sub" font-size="13">c</tspan> + W</text>

  <text x="360" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">COP<tspan baseline-shift="sub" font-size="11">warmtepomp</tspan> = Q<tspan baseline-shift="sub" font-size="11">h</tspan> / W  （> 1!)</text>

  <text x="360" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#c0392b">De COP kan ver boven 1 liggen:</text>
  <text x="360" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#c0392b">een warmtepomp levert méér warmte dan de elektriciteit die je erin stopt.</text>
</svg>