<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" width="700" height="600">
  <defs>
    <marker id="arrowQh" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowQc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <rect width="700" height="600" fill="#ffffff" rx="8"/>

  <!-- Warm reservoir -->
  <rect x="250" y="30" width="200" height="100" rx="10" fill="#fde8e8" stroke="#e74c3c" stroke-width="2"/>
  <text x="350" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c0392b">WARM RESERVOIR</text>
  <text x="350" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e74c3c">Temperatuur T<tspan baseline-shift="sub" font-size="10">h</tspan></text>
  <text x="350" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">bijv. verbranding, stoom</text>

  <!-- Qh pijlen naar motor -->
  <line x1="350" y1="135" x2="350" y2="195" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrowQh)"/>
  <text x="410" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">Q<tspan baseline-shift="sub" font-size="10">h</tspan> — warmte opgenomen</text>

  <!-- Motor -->
  <rect x="300" y="200" width="100" height="80" rx="8" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2"/>
  <text x="350" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">MOTOR</text>
  <text x="350" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Carnot-cyclus</text>

  <!-- Qc pijlen naar koud reservoir -->
  <line x1="350" y1="285" x2="350" y2="345" stroke="#3498db" stroke-width="4" marker-end="url(#arrowQc)"/>
  <text x="410" y="320" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">Q<tspan baseline-shift="sub" font-size="10">c</tspan> — warmte afgevoerd</text>

  <!-- Koud reservoir -->
  <rect x="250" y="350" width="200" height="100" rx="10" fill="#e8f0fe" stroke="#3498db" stroke-width="2"/>
  <text x="350" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2471a3">KOUD RESERVOIR</text>
  <text x="350" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#3498db">Temperatuur T<tspan baseline-shift="sub" font-size="10">c</tspan></text>
  <text x="350" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0a0a0">bijv. buitenlucht, koelwater</text>

  <!-- Arbeid W -->
  <line x1="405" y1="240" x2="520" y2="240" stroke="#2c3e50" stroke-width="3" marker-end="url(#arrowW)"/>
  <text x="530" y="244" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">W — nuttige arbeid</text>

  <!-- Formule onderin -->
  <text x="350" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">W = Q<tspan baseline-shift="sub" font-size="12">h</tspan> − Q<tspan baseline-shift="sub" font-size="12">c</tspan></text>
  <text x="350" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#7f8c8d" font-style="italic">De arbeid die de motor levert = de opgenomen warmte − de afgevoerde warmte</text>
  <text x="350" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">De afgevoerde warmte Q<tspan baseline-shift="sub" font-size="9">c</tspan> kan nooit nul zijn (tweede hoofdwet)</text>
</svg>